  <!-- Eye shine -->
  <circle cx="13.5" cy="13.5" r="1.3" fill="#ffffff" opacity="0.65"/>
  <!-- Blood drip -->
  <path d="M16 23.5 Q15.3 26.5 15.7 28.5 Q16 29.5 16.3 28.5 Q16.7 26.5 16 23.5Z" fill="#dc2626"/>
